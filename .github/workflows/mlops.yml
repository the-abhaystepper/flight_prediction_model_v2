name: Spark MLOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Launch Cassandra Container
        run: |
          docker run -d --name cassandra -p 9042:9042 cassandra:latest
          echo "Cassandra Instance Spawning..."

      - name: Install PySpark & Cassandra Drivers
        run: |
          pip install -r requirements.txt

      - name: Execute PyTest Diagnostics Check
        run: |
          pytest test_pipeline.py -v

      - name: Prepare Cassandra Schema (Native)
        run: |
          # Create Keyspace
          docker exec cassandra cqlsh -e "CREATE KEYSPACE IF NOT EXISTS flight_ks WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
          # Create Table structure to avoid Spark-Catalog partitioning errors
          docker exec cassandra cqlsh -e "CREATE TABLE IF NOT EXISTS flight_ks.flights (YEAR int, MONTH int, DAY int, DAY_OF_WEEK int, AIRLINE text, FLIGHT_NUMBER int, TAIL_NUMBER text, ORIGIN_AIRPORT text, DESTINATION_AIRPORT text, SCHEDULED_DEPARTURE int, DEPARTURE_TIME float, DEPARTURE_DELAY float, TAXI_OUT float, WHEELS_OFF float, SCHEDULED_TIME float, ELAPSED_TIME float, AIR_TIME float, DISTANCE int, WHEELS_ON float, TAXI_IN float, SCHEDULED_ARRIVAL int, ARRIVAL_TIME float, ARRIVAL_DELAY float, DIVERTED int, CANCELLED int, CANCELLATION_REASON text, AIR_SYSTEM_DELAY float, AIRLINE_DELAY float, WEATHER_DELAY float, SECURITY_DELAY float, LATE_AIRCRAFT_DELAY float, PRIMARY KEY (YEAR, MONTH, DAY, AIRLINE, ORIGIN_AIRPORT));"
          echo "Database Schema Ready."

      - name: Populate Cassandra Data (CI)
        run: |
          python prep_cassandra_ci.py
          echo "Data Ingested."

      - name: Initialize MLflow DB and check for upgrades
        run: |
          python -m mlflow db upgrade "sqlite:///mlflow.db"

      - name: Run Full Model Training Run
        run: |
          python flight_prediction_model_v4.py
          echo "Tests swept perfectly. MLOps execution finished."
