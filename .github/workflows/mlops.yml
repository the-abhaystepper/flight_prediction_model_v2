name: Spark MLOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_train:
    runs-on: ubuntu-latest

    # Manual management of container for named 'docker exec' support

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Launch Cassandra Container
        run: |
          docker run -d --name cassandra -p 9042:9042 cassandra:latest
          echo "Cassandra Instance Spawning..."

      - name: Install PySpark & Cassandra Drivers
        run: |
          pip install -r requirements.txt

      - name: Execute PyTest Diagnostics Check
        run: |
          pytest test_pipeline.py -v

      - name: Prepare Cassandra Keyspace (Native)
        run: |
          # Native CQL execution is more reliable than Spark Catalog for DDL
          docker exec cassandra cqlsh -e "CREATE KEYSPACE IF NOT EXISTS flight_ks WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
          echo "Keyspace Created."

      - name: Populate Cassandra Data (CI)
        run: |
          python prep_cassandra_ci.py
          echo "Data Ingested."

      - name: Run Full Model Training Run
        run: |
          python flight_prediction_model_v4.py
          echo "Tests swept perfectly. MLOps execution finished."
