name: Spark MLOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_train:
    runs-on: ubuntu-latest

    services:
      # Automatically initializes Cassandra endpoint for building/testing
      cassandra:
        image: cassandra:latest
        ports:
          - 9042:9042

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install PySpark & Cassandra Drivers
        run: |
          pip install -r requirements.txt

      - name: Execute PyTest Diagnostics Check
        run: |
          pytest test_pipeline.py -v

      - name: Sleep for Cassandra to accept Connections
        run: sleep 20

      - name: Run Full Model Training Run
        run: |
          python flight_prediction_model_v4.py
          echo "Tests swept perfectly. MLOps execution finished."
